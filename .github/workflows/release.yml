name: release

# Runs release-please on every push to main.
# release-please opens/updates a release PR that bumps the version in pyproject.toml.
# When that PR is merged, release-please creates the GitHub release, which triggers publish.yml.
# ref: https://github.com/googleapis/release-please-action

on:
  push:
    branches:
      - main
      - master

jobs:
  release-please:
    name: 🙏 release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: python
