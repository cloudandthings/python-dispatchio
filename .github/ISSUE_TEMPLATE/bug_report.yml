name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      render: python
      placeholder: |
        from dispatchio import ...
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: dispatchio version / Python version
      placeholder: "e.g., v0.1.0 / Python 3.11"
    validations:
      required: true
