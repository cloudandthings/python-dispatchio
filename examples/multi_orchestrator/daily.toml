# Dispatchio configuration — daily-etl orchestrator
#
# Both orchestrators share one SQLite database; namespace isolates their state.
# Events emitted by daily-etl can target weekly-reports by namespace.

[dispatchio]
namespace = "daily-etl"
log_level = "INFO"
default_cadence = "daily"

[dispatchio.state]
backend = "sqlalchemy"
connection_string = "sqlite:///dispatchio-example.db"
tick_log_path = ".dispatchio/daily-etl/tick_log.jsonl"

[dispatchio.receiver]
backend  = "filesystem"
drop_dir = ".dispatchio/daily-etl/completions"
