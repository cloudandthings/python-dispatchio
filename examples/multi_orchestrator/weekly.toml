# Dispatchio configuration — weekly-reports orchestrator
#
# Shares the same SQLite database as daily-etl; namespace keeps state isolated.
# aggregate waits for the "daily-complete" event emitted by daily-etl.

[dispatchio]
namespace = "weekly-reports"
log_level = "INFO"
default_cadence = "weekly"

[dispatchio.state]
backend = "sqlalchemy"
connection_string = "sqlite:///dispatchio-example.db"
tick_log_path = ".dispatchio/weekly-reports/tick_log.jsonl"

[dispatchio.receiver]
backend  = "filesystem"
drop_dir = ".dispatchio/weekly-reports/completions"
